{% block js %}
<script>
   var cart;
var storedData = localStorage.getItem('cart');
if (storedData == null || storedData == 'undefined') {
    cart = {};
} else {
    cart = JSON.parse(storedData);
}
  updateCart(cart);

  // 2. Add to Cart Logic

  // 4. Initialize Popover
  $(function () {
    $('#popcart').popover();
    document.getElementById("popcart").setAttribute('data-content', '<h5>Items in your cart</h5>');
  });

function updateCart(cart) {
    var sum=0;
    for (var item in cart) {
      sum+=cart[item][0];   
      // 1. Find the element
        let targetDiv = document.getElementById('div' + item);
        
        // 2. ONLY try to change innerHTML if the element actually exists
        if (targetDiv) {
            targetDiv.innerHTML = "<button id='minus" + item + "' class='btn btn-primary minus'>-</button> " +
                                  "<span id='val" + item + "'>" + cart[item][0] + "</span> " +
                                  "<button id='plus" + item + "' class='btn btn-primary plus'>+</button>";
        }
    }
    // 3. Update the localStorage and the counter here too
    localStorage.setItem('cart', JSON.stringify(cart));
    document.getElementById('cart').innerHTML = sum;
    updatePopover(cart);
}
function updatePopover(cart){
  var popstr="";
popstr=popstr+"<h5> Cart for you items in shoping cart:</h5><div clas='row mx-2 my-2'>";
  var i=1;
  for(var item in cart){
    popstr+="<b>"+i+". </b>";
    console.log('name'+item);  
    popstr+=document.getElementById('name'+item).innerHTML.slice(0,9)+"... Qty: "+cart[item][0]+"<br>";
    i+=1;
  }popstr+="</div><a href='/shop/checkout' class='btn btn-primary btn-sm mt-2 mx-2' id='checkout'>Checkout</a><button id='clearCart' onclick='clearCart()' class='btn btn-primary btn-sm mx-2 mt-2'>Clear Cart</button>";
  // document.getElementById('popcart').setAttribute('data-bs-content',popstr);
// Update the attribute
    let popElem = document.getElementById('popcart');
    
    // 1. Update the data attribute for consistency
    popElem.setAttribute('data-bs-content', popstr);

    // 2. Get the existing instance
    let instance = bootstrap.Popover.getInstance(popElem);

    if (instance) {
        // 3. Update the content directly without disposing
        instance.setContent({
            '.popover-body': popstr
        });
    } else {
        // Fallback: Initialize if it doesn't exist yet
        new bootstrap.Popover(popElem, {
            html: true,
            sanitize: false,
            trigger: 'click'
        });
    }
}
function clearCart(){
  cart=JSON.parse(localStorage.getItem('cart'));
  for(var item in cart){
document.getElementById('div'+item).innerHTML='<button id="'+item+'" class="cart btn btn-primary" type="button">Add to cart</button>'   }
localStorage.clear();
cart={};
updateCart(cart);
}
</script>
