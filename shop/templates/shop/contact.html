{% extends 'shop/basic.html' %}

{% block title %} Contact Us - MyAwesomeCart {% endblock %}
{% block css %}
    <style>
        /* Reset some default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
        }

        .contact-container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #444;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
        }

        input:focus, textarea:focus {
            border-color: #007BFF;
            outline: none;
        }

        button {
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .contact-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>{% endblock %}
{% block body %}
<body>

    <div class="contact-container">
        <h2>Contact Us</h2>
        <form class="contact-form" action="/shop/contact/" method="post"> {%csrf_token %} 
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>

            <label for="phone">Phone</label>
            <input type="number" id="phone" name="phone" placeholder="Phone No." required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>
<br>
            <button type="submit">Send Message</button>
        </form>
    </div>



{% endblock %}
{% block js %}
{{ block.super }}
<script>
var yesno="{{thank}}";
if (yesno=="True") { 
alert("Thank you for contacting us. We will get back to you soon!");
document.location="/shop/contact ";
}
</script>
{% endblock %}
